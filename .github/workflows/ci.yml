name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run validate:assets
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=desktop
        env:
          CI: true
